<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snitap</title>

  <link rel="stylesheet" href="styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Syne:wght@400..800&display=swap" rel="stylesheet">
</head>

<body>
  <nav class="container">
    <a href="">
      <img src="assets/Logo.svg" alt="Logo Snitap"
      class="ah-rotate">
    </a>
    <a href="#">
      <img src="assets/icons/shopping-bag.svg" alt="Icone de compras"
        class="ah-tilt">
      <span>1</span>
    </a>
  </nav>

  <section id="hero" class="container flex">
    <div class="flex hero-header">
      <div class="flex text-wrapper">
        <h1>
          Snitap, sua vida mais
          <div class="a-upbounce">
            <span class="hl-sky"> radical</span>
            <span class="hl-joy"> divertida</span>
            <span class="hl-leaf"> saudável</span>
            <span class="hl-sky"> radical</span>
          </div>
        </h1>        
      </div>

      <div class="flex buttons-wrapper">
        <a href="#" class="button-sun flex shadow">
          <img src="assets/icons/shopping-bag.svg" alt="Botão de comprar">
          <span>Comprar agora</span>
        </a>
        <a href="#" alt="Botão de play" class="button-white flex">
          <span class="flex shadow"><img src="assets/icons/play.svg" alt="Botão de play"></span>
          <span>Veja em ação</span>
        </a>
      </div>
    </div>

    <div class="flex rollerskate">
      <div class="content">
        <img src="assets/hero/ellipse.svg" alt="">
        <img src="assets/hero/rollerskate.png" alt="">
        <img src="assets/hero/stars-1.svg" alt="">
        <img src="assets/hero/stars-2.svg" alt="">        
      </div>
    </div>
  </section>

  <section class="banner container">
    <div class="scroller gradient-transition">
      <div class="rolling flex">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
        <img src="assets/banner-text.svg" alt="">
      </div>
    </div>
  </section>

  <section class="gallery container">
    <header>
      <span>Galeria de fotos</span>
      <h2>#usesnitap por aí</h2>
    </header>

    <div class="content">
      <figure>
        <img src="assets/images/image-01.png" alt="">
        <figcaption class="flex">
          <img src="assets/profile-pic.png" alt="">
          <span>@laviniapereira</span>
        </figcaption>
      </figure>

      <figure data-delay>
        <img src="assets/images/image-02.png" alt="">
        <figcaption class="flex">
          <img src="assets/profile-pic.png" alt="">
          <span>@laviniapereira</span>
        </figcaption>
      </figure>

      <figure>
        <img src="assets/images/image-03.png" alt="">
        <figcaption class="flex">
          <img src="assets/profile-pic.png" alt="">
          <span>@laviniapereira</span>
        </figcaption>
      </figure>

      <figure data-delay>
        <img src="assets/images/image-04.png" alt="">
        <figcaption class="flex">
          <img src="assets/profile-pic.png" alt="">
          <span>@laviniapereira</span>
        </figcaption>
      </figure>
    </div>
  </section>
</body>
</html>
